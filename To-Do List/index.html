<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="heading">
      <h1>Make Your Own To-Do List</h1>
    </div>
    <div class="input-content">
      <input type="text" id="task" placeholder="Enter Tasks">
      <div class="btns">
        <button class="add-task" onclick="addTask()">Add Tasks</button>
        <button class="clear-task" onclick="clearAll()">Clear All</button>
      </div>
    </div>
    <div class="content">
        <span onclick="toggelDone(i)" style="cursor:pointer;"><ul id="list"></ul></span>
      </div>
  </div>
<!-- script for Add Task -->
<script>
  let tasks = [];
  function displayTask(){ 
    let html ="";
    
    for(let i=0 ; i<tasks.length ;i++){
      html += "<li>" + tasks[i].text + "<button id='remove' onclick='removeTask("+ i +")'>X</button></li>"
    }
      document.getElementById("list").innerHTML = html ;
  }

  function saveTask(){
    localStorage.setItem("tasks", JSON.stringify(tasks))
  }

  // add enter to input field 
  let input = document.getElementById("task")
  input.addEventListener("keypress",function(event){
    if (event.key === "Enter"){
      addTask();
    }
  })

  function addTask(){
    let text = document.getElementById("task");
    let textInput = text.value;
    if (textInput.trim() === ""){
      alert("Please Enter input field first.")
      return;
    }
    tasks.push({
      text:textInput,
      done:false
    });
    text.value = "";
    saveTask();
    displayTask();
  }

  function clearAll(){
    tasks = [];
    saveTask();
    displayTask();
  }
  
  function removeTask(i){
    tasks.splice(i,1)
    saveTask();
    displayTask();
  }

  function loadTasks(){
    let saved = localStorage.getItem("tasks");
    if(saved !== null){
      tasks = JSON.parse(saved);
    }

  }
  loadTasks();
  displayTask();

  

</script>
</body>
</html>
